name: Daily Market Data

on:
  schedule:
    - cron: "30 22 * * 0-4"

permissions:
  contents: read

concurrency:
  group: daily-market-data
  cancel-in-progress: true

jobs:
  run-daily-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Seoul
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --extra all --extra dev

      - name: Run daily batch (KR + US snapshots)
        run: uv run python scripts/run_daily_batch.py

      - name: Upload batch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-data-batch-${{ github.run_id }}
          path: out/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload snapshots to release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/snapshots/*/**.json
          tag_name: snapshot-${{ github.event.schedule || 'manual' }}-${{ github.run_id }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
